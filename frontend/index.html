
<!DOCTYPE html>
<html>
<head>
  <title>Stable Fin Payment</title>
</head>

<body>

  <h1>💰 Stable Fin Payment System</h1>

  <button onclick="testAPI()">Test</button>
  <button onclick="getUPI()">UPI</button>
  <button onclick="getCrypto()">Crypto</button>
  <button onclick="createB2B()">Create B2B Payment</button>
<button onclick="checkB2B()">Check B2B Status</button>
<button onclick="payB2B()">Simulate Pay</button>
<button onclick="createTicket()">Create Ticket</button>
<button onclick="viewTickets()">View Tickets</button>
<button onclick="replyTicket()">Reply Ticket</button>
<button onclick="closeTicket()">Close Ticket</button>








  <pre id="output"></pre>

  <script>
    console.log("JS Loaded ✅");

    const BASE_URL = "https://stable-fin-backend-1.onrender.com";

    async function testAPI() {
      console.log("Test clicked");

      const res = await fetch(`${BASE_URL}/test`);
      const data = await res.json();

      document.getElementById("output").innerText =
        JSON.stringify(data, null, 2);
    }

    async function getUPI() {
      console.log("UPI clicked");

      const res = await fetch(`${BASE_URL}/upi-qr`);
      const data = await res.json();

      document.getElementById("output").innerText =
        JSON.stringify(data, null, 2);
    }

    async function getCrypto() {
      console.log("Crypto clicked");

      const res = await fetch(`${BASE_URL}/crypto-link`);
      const data = await res.json();

      document.getElementById("output").innerText =
        JSON.stringify(data, null, 2);
    }


   
let currentB2BId = null;

// CREATE
async function createB2B() {
  const res = await fetch(`${BASE_URL}/b2b/create`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      company: "Demo Company",
      amount: 500
    })
  });

  const data = await res.json();

  currentB2BId = data.id;

  document.getElementById("output").innerText =
    JSON.stringify(data, null, 2);
}

// STATUS
async function checkB2B() {
  if (!currentB2BId) {
    alert("Create payment first");
    return;
  }

  const res = await fetch(`${BASE_URL}/b2b/status/${currentB2BId}`);
  const data = await res.json();

  document.getElementById("output").innerText =
    JSON.stringify(data, null, 2);
}

// SIMULATE PAY
async function payB2B() {
  if (!currentB2BId) {
    alert("Create payment first");
    return;
  }

  const res = await fetch(`${BASE_URL}/b2b/pay/${currentB2BId}`);
  const data = await res.json();

  document.getElementById("output").innerText =
    JSON.stringify(data, null, 2);
}




let currentTicketId = null;

// CREATE
async function createTicket() {
  const res = await fetch(`${BASE_URL}/support/create`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: "Client",
      issue: "Payment not received"
    })
  });

  const data = await res.json();

  currentTicketId = data.id;

  document.getElementById("output").innerText =
    JSON.stringify(data, null, 2);
}

// VIEW
async function viewTickets() {
  const res = await fetch(`${BASE_URL}/support/all`);
  const data = await res.json();

  document.getElementById("output").innerText =
    JSON.stringify(data, null, 2);
}

// REPLY
async function replyTicket() {
  if (!currentTicketId) {
    alert("Create ticket first");
    return;
  }

  const res = await fetch(`${BASE_URL}/support/reply/${currentTicketId}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: "We are checking your issue"
    })
  });

  const data = await res.json();

  document.getElementById("output").innerText =
    JSON.stringify(data, null, 2);
}

// CLOSE
async function closeTicket() {
  if (!currentTicketId) {
    alert("Create ticket first");
    return;
  }

  const res = await fetch(`${BASE_URL}/support/close/${currentTicketId}`);
  const data = await res.json();

  document.getElementById("output").innerText =
    JSON.stringify(data, null, 2);
}
















  </script>

</body>
</html>
