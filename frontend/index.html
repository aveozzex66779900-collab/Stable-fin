let currentB2BId = null;

// CREATE
async function createB2B() {
  const res = await fetch(`${BASE_URL}/b2b/create`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      company: "Demo Company",
      amount: 500
    })
  });

  const data = await res.json();

  currentB2BId = data.id;

  document.getElementById("output").innerText =
    JSON.stringify(data, null, 2);
}

// STATUS
async function checkB2B() {
  if (!currentB2BId) {
    alert("Create payment first");
    return;
  }

  const res = await fetch(`${BASE_URL}/b2b/status/${currentB2BId}`);
  const data = await res.json();

  document.getElementById("output").innerText =
    JSON.stringify(data, null, 2);
}

// SIMULATE PAY
async function payB2B() {
  if (!currentB2BId) {
    alert("Create payment first");
    return;
  }

  const res = await fetch(`${BASE_URL}/b2b/pay/${currentB2BId}`);
  const data = await res.json();

  document.getElementById("output").innerText =
    JSON.stringify(data, null, 2);
}




let currentTicketId = null;

// CREATE
async function createTicket() {
  const name = document.getElementById("name").value;
  const issue = document.getElementById("issue").value;

  const res = await fetch(`${BASE_URL}/support/create`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name, issue })
  });

  const data = await res.json();

  alert("Ticket Created ✅ ID: " + data.id);
}




// VIEW


async function viewTickets() {
  const res = await fetch(`${BASE_URL}/support/all`);
  const data = await res.json();

  let html = "";

  data.forEach(t => {
    html += `
      <div class="ticket">
        <b>ID:</b> ${t.id} <br>
        <b>Name:</b> ${t.name} <br>
        <b>Issue:</b> ${t.issue} <br>
        <b>Status:</b> ${t.status}
      </div>
    `;
  });

  document.getElementById("tickets").innerHTML = html;
}
















// REPLY
async function replyTicket() {
  if (!currentTicketId) {
    alert("Create ticket first");
    return;
  }

  const res = await fetch(`${BASE_URL}/support/reply/${currentTicketId}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: "We are checking your issue"
    })
  });

  const data = await res.json();

  document.getElementById("output").innerText =
    JSON.stringify(data, null, 2);
}

// CLOSE
async function closeTicket() {
  if (!currentTicketId) {
    alert("Create ticket first");
    return;
  }

  const res = await fetch(`${BASE_URL}/support/close/${currentTicketId}`);
  const data = await res.json();

  document.getElementById("output").innerText =
    JSON.stringify(data, null, 2);
}
















  </script>


<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
async function realPay() {
  const res = await fetch(`${BASE_URL}/real/create-order`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ amount: 100 })
  });

  const order = await res.json();

  const options = {
    key: "YOUR_RAZORPAY_KEY", // replace later
    amount: order.amount,
    currency: "INR",
    name: "Stable Fin",
    order_id: order.id,
    handler: function (response) {
      alert("Payment Successful ✅");
      console.log(response);
    }
  };

  const rzp = new Razorpay(options);
  rzp.open();
}
</script>
