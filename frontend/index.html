<!DOCTYPE html>
<html>
<head>
  <title>Stable Fin 💰</title>
</head>
<body>

<h1>💰 Stable Fin Payment System</h1>

<button onclick="testAPI()">Test Payment API</button>
<button onclick="getQR()">Old QR</button>
<button onclick="getUPI()">UPI Payment</button>
<button onclick="getCrypto()">Crypto Payment 🚀</button>

<div id="output"></div>
<div id="qr-container"></div>

<script>
const API_URL = "https://stable-fin-backend-1.onrender.com";
// Test API
async function testAPI() {
  const res = await fetch(`${API_URL}/payment`);
  const data = await res.json();
  document.getElementById("output").innerText = JSON.stringify(data);
}

// Old QR
async function getQR() {
  const res = await fetch(`${API_URL}/qr`);
  const data = await res.json();
  document.getElementById("output").innerText = JSON.stringify(data);
}

// UPI QR
async function getUPI() {
  const res = await fetch(`${API_URL}/upi-qr`);
  const data = await res.json();

  const qrImage = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(data.qr)}`;

  document.getElementById("qr-container").innerHTML = `
    <h3>Scan & Pay (UPI)</h3>
    <img src="${qrImage}" />
  `;
}

// Crypto
async function getCrypto() {
  const res = await fetch(`${API_URL}/crypto-link`);
  const data = await res.json();

  window.open(data.link, "_blank");
}
</script>

</body>
</html>
